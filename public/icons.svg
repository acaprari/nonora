<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <!-- Settings Icon - Gear -->
  <symbol id="settings" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
  </symbol>

  <!-- Refresh Icon - Circular Arrow -->
  <symbol id="refresh" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M1 4v6h6"/>
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
  </symbol>

  <!-- Key Icon - Traditional key shape -->
  <symbol id="key" viewBox="0 0 24 24">
    <!-- Key head (circle with center hole) -->
    <circle fill="none" stroke="currentColor" stroke-width="1.5" cx="7" cy="17" r="4"/>
    <circle fill="none" stroke="currentColor" stroke-width="1.5" cx="7" cy="17" r="1.5"/>
    <!-- Key shaft -->
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M11 13 21 3"/>
    <!-- Key teeth -->
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M18 6v2m2-4v2"/>
  </symbol>

  <!-- Close/X Icon -->
  <symbol id="close" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M18 6 6 18M6 6l12 12"/>
  </symbol>

  <!-- Lightbulb Icon - Hint -->
  <symbol id="lightbulb" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M9 18h6m-5 4h4m-7-9a7 7 0 1 1 10 0c-1 1-2 2-2 4H9c0-2-1-3-2-4Z"/>
  </symbol>

  <!-- Target Icon - Specific Hint -->
  <symbol id="target" viewBox="0 0 24 24">
    <circle fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            cx="12" cy="12" r="10"/>
    <circle fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            cx="12" cy="12" r="6"/>
    <circle fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            cx="12" cy="12" r="2"/>
  </symbol>

  <!-- Trophy Icon - Achievement/Completion -->
  <symbol id="celebration" viewBox="0 0 24 24">
    <!-- Cup handles -->
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M8 7H6a2 2 0 0 0-2 2v1a2 2 0 0 0 2 2h2"/>
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M16 7h2a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2h-2"/>
    <!-- Cup body -->
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M8 7v6a4 4 0 0 0 8 0V7H8Z"/>
    <!-- Trophy stem and base -->
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
          d="M12 17v2m-4 0h8"/>
  </symbol>

  <!-- Sparkle Icon - AI Thinking/Magic (matches ✨ emoji style) -->
  <symbol id="sparkle" viewBox="0 0 24 24">
    <!-- Main 4-point star (classic sparkle shape) -->
    <path fill="currentColor" stroke="none"
          d="M12 2 L13.5 10 L13.5 10.5 L22 12 L13.5 13.5 L13.5 13.5 L12 22 L10.5 13.5 L10.5 13.5 L2 12 L10.5 10.5 L10.5 10.5 Z"/>
    <!-- Small accent sparkles (tiny 4-point stars) -->
    <path fill="currentColor" stroke="none"
          d="M5 5 L5.5 6.5 L7 7 L5.5 7.5 L5 9 L4.5 7.5 L3 7 L4.5 6.5 Z"/>
    <path fill="currentColor" stroke="none"
          d="M19 4 L19.5 5 L20.5 5.5 L19.5 6 L19 7 L18.5 6 L17.5 5.5 L18.5 5 Z"/>
    <path fill="currentColor" stroke="none"
          d="M19 18 L19.3 18.7 L20 19 L19.3 19.3 L19 20 L18.7 19.3 L18 19 L18.7 18.7 Z"/>
  </symbol>
</svg>
