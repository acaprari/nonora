<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 2×2 nonogram grid with diagonal filled cells -->

  <!-- Top-left cell: FILLED (green) -->
  <rect x="2" y="2" width="30" height="30" fill="#4CAF50" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Top-right cell: EMPTY (white) -->
  <rect x="32" y="2" width="30" height="30" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Bottom-left cell: EMPTY (white) -->
  <rect x="2" y="32" width="30" height="30" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Bottom-right cell: FILLED (green) -->
  <rect x="32" y="32" width="30" height="30" fill="#4CAF50" stroke="#e0e0e0" stroke-width="1"/>

  <!-- External border (thicker) -->
  <rect x="1" y="1" width="62" height="62" fill="none" stroke="#e0e0e0" stroke-width="2"/>
</svg>
